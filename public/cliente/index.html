<!doctype html>
<html lang="it"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Area Cliente — Gestionale Palestra</title>
<link rel="stylesheet" href="/css/app.css">
</head><body class="app-body cliente-body">
<header class="topbar cliente-topbar">
  <div class="brand">Area Cliente</div>
  <nav class="nav">
    <form method="POST" action="/cliente/logout" style="display:inline">
      <button type="submit" class="btn btn-ghost">Esci</button>
    </form>
  </nav>
</header>

<main class="container cliente-main">
  <h1 id="ciao">Ciao</h1>
  <p class="muted">V1 minima. Le funzioni di allenamento, feedback e cronologia saranno disponibili nei prossimi step.</p>

  <section class="grid grid-2">
    <div class="card">
      <h2>Saldo ingressi</h2>
      <p class="muted small">Disponibile dopo il prossimo step.</p>
    </div>
    <div class="card">
      <h2>Prossima seduta</h2>
      <p class="muted small">Disponibile dopo il prossimo step.</p>
    </div>
  </section>
</main>

<script src="/js/app.js"></script>
<script>
  (function () {
    const u = window.__USER__ || {};
    if (u.nome) document.getElementById('ciao').textContent = 'Ciao, ' + u.nome;
  })();
</script>
</body></html>
